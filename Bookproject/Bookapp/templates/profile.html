<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
     <h1>Profile Page</h1>
     <a href="/book/">Home</a>
     <h3>My name is : {{name}}</h3>
     <h3>My Email is : {{email}}</h3>
     <table border="5">
         <tr>
             <th>Name</th>
             <th>Email</th>
         </tr>
         {% for data in user_data %}
         <tr>
             <td>{{data.name}}</td>
             <td>{{data.email}}</td>
         </tr>
         {% endfor %}
     </table>
</body>
</html>
